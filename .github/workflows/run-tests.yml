name: Run Tests
on: [push, pull_request, workflow_dispatch]
jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        emacs-version: ['29.4', '30.1']
    steps:
      - name: Check out
        uses: actions/checkout@main

      - name: Cache nix store
        uses: actions/cache@v4
        with:
          path: /nix
          key: nix-${{ matrix.emacs-version }}

      - name: Install Emacs
        uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs-version }}

      - name: Cache packages
        uses: actions/cache@v4
        with:
          path: .elpa
          key: elpa-${{ matrix.emacs-version }}-${{ hashFiles('Makefile') }}

      - name: Install dependencies
        run: make deps

      - name: Run unit tests
        run: make test

      - name: Run embark integration tests
        run: make test-embark

      - name: Check byte-compilation
        run: make check-compile

  integration-tests:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        emacs-version: ['29.4', '30.1']
    steps:
      - name: Check out
        uses: actions/checkout@main

      - name: Cache nix store
        uses: actions/cache@v4
        with:
          path: /nix
          key: nix-${{ matrix.emacs-version }}

      - name: Install Emacs
        uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs-version }}

      - name: Cache packages
        uses: actions/cache@v4
        with:
          path: .elpa
          key: elpa-${{ matrix.emacs-version }}-${{ hashFiles('Makefile') }}

      - name: Install dependencies
        run: make deps

      - name: Configure ghub
        run: |
          git config --global github.user remoto
          git config --global github.host api.github.com

      - name: Run integration tests
        run: make test-integration
        env:
          REMOTO_TEST_TOKEN: ${{ secrets.GH_API_TOKEN }}
